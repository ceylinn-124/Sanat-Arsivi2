<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol | Sanat Arşivi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="auth-card">
        <h2>KAYIT OL</h2>
        
        <form>
            <input type="text" class="input-box" placeholder="Adınız ve Soyadınız" required>
            <input type="email" class="input-box" placeholder="E-posta Adresiniz" required>
            <input type="text" class="input-box" placeholder="Kullanıcı Adı" required>
            
            <input type="password" class="input-box" placeholder="Şifre" required>
            <input type="password" class="input-box" placeholder="Şifre Tekrar" required>
            
            <button type="submit" class="auth-btn">HESAP OLUŞTUR</button>
        </form>

        <div class="auth-footer">
            Zaten hesabın var mı? <a href="giris.html">Giriş Yap</a>
        </div>
    </div>

</body>
</html>
